<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lumina Tracer - Active Session</title>
    <link rel="icon" href="data:,">
    <style>
        /* --- 基础布局 --- */
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* 全黑环境 */
            overflow: hidden; /* 禁止滚动 */
            font-family: 'Segoe UI', sans-serif;
            cursor: none; /* 测试时隐藏鼠标，避免干扰 */
            user-select: none; /* 禁止选中文本 */
        }

        /* --- 视觉刺激元素 --- */
        
        /* 1. 中心注视点 (十字) */
        #fixation {
            position: absolute;
            top: 50%; left: 50%;
            width: 30px; height: 30px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        #fixation::before, #fixation::after {
            content: '';
            position: absolute;
            background: #444; /* 深灰色，不要太亮以免造成残影 */
        }
        #fixation::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #fixation::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

        /* 2. 刺激光点 */
        #stimulus {
            position: absolute;
            border-radius: 50%;
            display: none; /* 默认隐藏 */
            pointer-events: none;
            z-index: 200;
            /* 消除锯齿 */
            box-shadow: 0 0 1px rgba(255,255,255,0.5); 
        }

        /* --- UI 控制区 (右上角) --- */
        #controls-panel {
            position: fixed;
            top: 0; right: 0;
            padding: 20px;
            background: rgba(40, 40, 40, 0.8);
            border-bottom-left-radius: 10px;
            color: #ccc;
            z-index: 2000;
            opacity: 0.2; /* 默认半透明，防干扰 */
            transition: opacity 0.3s;
            cursor: default; /* 恢复鼠标 */
            text-align: right;
        }
        #controls-panel:hover { opacity: 1.0; }

        .btn-stop {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn-stop:hover { background: #c82333; }
        
        .camera-toggle {
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            display: block;
        }
        .camera-toggle input { vertical-align: middle; }

        /* --- 摄像头预览窗口 (左下角) --- */
        #webcam-container {
            position: fixed;
            bottom: 20px; left: 20px;
            width: 160px; height: 120px;
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #webcam-video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像翻转 */
        }
        .webcam-label {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.6);
            color: white; font-size: 10px;
            text-align: center; padding: 2px 0;
        }
    </style>
</head>
<body>

    <div id="fixation"></div>
    <div id="stimulus"></div>

    <div id="webcam-container">
        <video id="webcam-video" autoplay playsinline></video>
        <div class="webcam-label">Eye Monitor</div>
    </div>

    <div id="controls-panel">
        <div style="margin-bottom: 5px; font-size: 0.9em;">Test Running...</div>
        <button onclick="terminateTest()" class="btn-stop">提前结束测试 (Stop)</button>
        
        <label class="camera-toggle">
            <input type="checkbox" id="toggle-camera" onchange="toggleWebcam()"> 
            启用摄像头监控
        </label>
    </div>

    <script>
        // --- 1. 初始化配置 ---
        const sessionId = "{{ session['session_id'] }}";
        let isRunning = false;
        let currentPointId = null;
        let stimulusOnTime = 0;
        const responseWindow = 1500; // 1.5秒反应时间
        let reactionTimer = null;
        let hasResponded = false;

        // --- 初始化配置获取 ---        
        async function initTestConfig() {
            try {
                const response = await fetch('/api/test/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        window_width: window.innerWidth,
                        window_height: window.innerHeight
                    })
                });
                
                const data = await response.json();
                if (data.status === 'success' && data.bg_color) {
                    // 设置初始背景色
                    document.body.style.backgroundColor = data.bg_color;
                    console.log('Test initialized with config:', {
                        theme: data.theme || 'default',
                        bg_color: data.bg_color
                    });
                }
            } catch (err) {
                console.error('Failed to initialize test config:', err);
                // 失败时使用默认黑色背景
                document.body.style.backgroundColor = '#000000';
            }
        }

        // 页面加载完成后自动开始
        window.onload = function() {
            console.log("Session ID:", sessionId);
            // 先初始化配置，再开始测试
            initTestConfig().then(() => {
                // 延迟1秒开始，给用户准备时间
                setTimeout(startTestCycle, 1000);
            });
        };

        function startTestCycle() {
            if (isRunning) return;
            isRunning = true;
            nextStimulus();
        }

        // --- 2. 核心循环：请求 -> 显示 -> 响应 ---
        function nextStimulus() {
            if (!isRunning) return;

            fetch('/api/test/next', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    window_width: window.innerWidth,
                    window_height: window.innerHeight,
                    action: 'next'
                })
            })
            .then(res => res.json())
            .then(data => {
                // 处理特殊状态
                if (data.status === 'finished') {
                    finishTest();
                    return;
                }
                if (data.status === 'error') {
                    console.error(data.msg);
                    return; // 暂不处理错误，避免弹窗刷屏
                }

                // 设置页面背景色
                if (data.bg_color) {
                    document.body.style.backgroundColor = data.bg_color;
                }

                // 显示光点
                currentPointId = data.point_id;
                renderStimulus(data);
            })
            .catch(err => {
                console.error("Network Error:", err);
                // 网络错误重试
                setTimeout(nextStimulus, 2000);
            });
        }

        function renderStimulus(data) {
            const el = document.getElementById('stimulus');
            
            // 坐标定位
            el.style.left = (data.x - data.size/2) + 'px';
            el.style.top = (data.y - data.size/2) + 'px';
            el.style.width = data.size + 'px';
            el.style.height = data.size + 'px';
            
            // 颜色与透明度 (dB越高 -> alpha越低)
            el.style.backgroundColor = `rgba(255, 255, 255, ${data.alpha})`;

            // 随机间隔 (200-500ms)
            const interval = Math.floor(Math.random() * 300) + 200;

            setTimeout(() => {
                if (!isRunning) return;

                // 亮起
                el.style.display = 'block';
                stimulusOnTime = Date.now();
                hasResponded = false;

                // 持续 200ms 后熄灭
                setTimeout(() => {
                    el.style.display = 'none';
                    waitForResponse();
                }, 200);

            }, interval);
        }

        function waitForResponse() {
            // 设置超时，如果没按键则视为未看见
            reactionTimer = setTimeout(() => {
                if (!hasResponded) {
                    submitResult(false, 0);
                }
            }, responseWindow);
        }

        // --- 3. 交互响应 ---
        document.addEventListener('keydown', function(event) {
            // 空格键响应
            if (event.code === 'Space' && isRunning && !hasResponded) {
                // 只有在光点刚出现的一段时间内按键才有效
                if (Date.now() - stimulusOnTime < responseWindow + 200) {
                    hasResponded = true;
                    clearTimeout(reactionTimer);
                    
                    const rt = Date.now() - stimulusOnTime;
                    submitResult(true, rt);
                }
            }
            // ESC 键快捷结束
            if (event.code === 'Escape') {
                terminateTest();
            }
        });

        function submitResult(seen, rt) {
            if (!isRunning) return;

            fetch('/api/test/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    point_id: currentPointId,
                    seen: seen,
                    reaction_time: rt,
                    window_width: window.innerWidth,
                    window_height: window.innerHeight
                })
            })
            .then(() => {
                // 提交完成后，立即请求下一个
                nextStimulus();
            });
        }

        // --- 4. 结束流程 (关键修复点) ---
        
        // 正常结束
        function finishTest() {
            isRunning = false;
            document.body.style.cursor = 'default';
            // 不用 alert，直接跳转，体验更好
            window.location.href = '/analysis/report/' + sessionId;
        }

        async function terminateTest() {
            if (!confirm("确定要提前结束测试并生成报告吗？(未完成区域将使用预测值)")) return;
            
            // 1. 锁死前端状态，防止继续请求 Next
            isRunning = false; 
            
            const btn = document.querySelector('.btn-stop');
            if(btn) {
                btn.innerText = "正在保存...";
                btn.disabled = true;
            }

            // 2. 发送强制终止信号 (调用专门的 terminate 接口)
            try {
                const response = await fetch('/api/test/terminate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (response.ok && data.redirect_url) {
                    console.log("Data saved, redirecting...");
                    window.location.href = data.redirect_url;
                } else {
                    throw new Error(data.error || "Unknown error");
                }

            } catch (err) {
                console.error("Stop error:", err);
                alert("保存数据出错，将强制跳转...");
                // 即使出错也尝试跳转，防止用户卡在黑屏
                window.location.href = '/analysis/report/' + sessionId;
            }
        }

        // --- 5. 摄像头控制 ---
        function toggleWebcam() {
            const video = document.getElementById('webcam-video');
            const container = document.getElementById('webcam-container');
            const checkbox = document.getElementById('toggle-camera');

            if (checkbox.checked) {
                container.style.display = 'block';
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        video.srcObject = stream;
                    })
                    .catch(function(err) {
                        console.log("Camera Error: " + err);
                        alert("无法调用摄像头，请检查浏览器权限。");
                        checkbox.checked = false;
                        container.style.display = 'none';
                    });
                }
            } else {
                container.style.display = 'none';
                const stream = video.srcObject;
                if (stream) {
                    const tracks = stream.getTracks();
                    tracks.forEach(track => track.stop());
                    video.srcObject = null;
                }
            }
        }
    </script>
</body>
</html>
