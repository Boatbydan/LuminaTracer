<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Lumina Tracer</title>
    <link rel="icon" href="data:,">
    <style>
        /* --- 复用登录页的 CSS 样式 --- */
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden;
        }
        .auth-container { display: flex; height: 100%; width: 100%; }
        .side-image {
            flex: 1; /* 自动撑开剩余空间 */
            /* 1. 设置底色 (当图片未填满区域时显示的颜色) */
            background-color: #0f0f0f; 
            /* 2. 居中显示 */
            background-position: center center;
            /* 3. 禁止平铺 */
            background-repeat: no-repeat;
            /* 4. 关键设置：'contain' 会保证正方形完整显示 */
            /* 如果觉得图片太大，可以改成具体的百分比，例如 '60%' */
            background-size: contain; 
            
            position: relative;
        }
        /* 复用相同的图片，保持风格统一 */
        /* 左侧图片路径 */
        .side-image.left {
            background-image: url("{{ url_for('static', filename='images/auth_left.jpg') }}");
            /* 可选：如果你想让图片稍微离中间远一点 */
            background-position: center right 20px; 
        }
        
        /* 右侧图片路径 */
        .side-image.right {
            background-image: url("{{ url_for('static', filename='images/auth_right.jpg') }}");
            /* 可选：如果你想让图片稍微离中间远一点 */
            background-position: center left 20px;
        }
        .side-image::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); }

        .main-content {
            flex: 0 0 500px; /* 注册页表单更长，稍微宽一点 */
            display: flex; justify-content: center; align-items: center;
            background: #050505; padding: 30px; z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow-y: auto; /* 如果屏幕太矮，允许中间滚动 */
        }

        .auth-card {
            background: #121212; padding: 40px; border-radius: 16px;
            width: 100%; max-width: 420px; text-align: center; border: 1px solid #333;
        }
        
        h2 { margin: 0 0 35px 0; font-weight: 400; letter-spacing: 1px; color: #fff; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; color: #aaa; font-weight: 600; }
        input, select {
            width: 100%; padding: 12px;
            background: #1e1e1e; border: 1px solid #444;
            color: white; border-radius: 8px;
            box-sizing: border-box; outline: none; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: #28a745; background: #252525; }
        
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .btn-submit {
            width: 100%; padding: 14px; margin-top: 15px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%); /* 绿色 */
            color: white; border: none; border-radius: 8px;
            font-size: 1.05em; cursor: pointer; font-weight: 600;
            transition: transform 0.2s; letter-spacing: 1px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4); }
        
        .links { margin-top: 25px; font-size: 0.9em; color: #888; }
        .links a { color: #28a745; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }

        .alert {
            background: rgba(220, 53, 69, 0.25); color: #ff8888; padding: 12px;
            border-radius: 8px; margin-bottom: 25px; font-size: 0.9em; border: 1px solid #dc3545;
        }
        
        @media (max-width: 900px) {
            .side-image { display: none; }
            .main-content { flex: 1; background: #050505; height: auto; }
            .auth-card { box-shadow: none; border: none; background: transparent; }
            body { overflow: auto; } /* 手机上允许整体滚动 */
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="side-image left"></div>

        <div class="main-content">
            <div class="auth-card">
                <h2>创建新账号 (Create Account)</h2>

                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="alert">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="form-group">
                        <label>登录邮箱 (Email ID)</label>
                        <input type="email" name="email" required placeholder="user@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label>真实姓名 (Full Name)</label>
                        <input type="text" name="name" required placeholder="张三 / John Doe">
                    </div>

                    <div class="row">
                        <div class="col form-group">
                            <label>年龄 (Age)</label>
                            <input type="number" name="age" required min="5" max="120" placeholder="30">
                        </div>
                        <div class="col form-group">
                            <label>性别 (Gender)</label>
                            <select name="gender">
                                <option value="M">男 (Male)</option>
                                <option value="F">女 (Female)</option>
                                <option value="O">其他 (Other)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>设置密码 (Set Password)</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-submit">立即注册 (Register Now)</button>
                </form>

                <div class="links">
                    已有账号？ (Already have an account?) <br>
                    <a href="{{ url_for('auth.login') }}" style="display: inline-block; margin-top: 10px; font-size: 1.1em;">返回登录 (Log In)</a>
                </div>
            </div>
        </div>

        <div class="side-image right"></div>
    </div>
</body>
</html>
